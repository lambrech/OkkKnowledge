<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Stripes -->
  <rect y="0" width="300" height="50" fill="#000"/>
  <rect y="50" width="300" height="8" fill="#fff"/>
  <rect y="58" width="300" height="84" fill="#BB0000"/>
  <rect y="142" width="300" height="8" fill="#fff"/>
  <rect y="150" width="300" height="50" fill="#006600"/>
  <!-- Maasai shield and spears -->
  <g transform="translate(150,100)">
    <!-- Spears behind shield -->
    <line x1="-25" y1="-65" x2="25" y2="65" stroke="#000" stroke-width="3"/>
    <line x1="25" y1="-65" x2="-25" y2="65" stroke="#000" stroke-width="3"/>
    <!-- Spear tips -->
    <polygon points="-28,65 -25,75 -22,65" fill="#000"/>
    <polygon points="22,65 25,75 28,65" fill="#000"/>
    <polygon points="-28,-65 -25,-75 -22,-65" fill="#000"/>
    <polygon points="22,-65 25,-75 28,-65" fill="#000"/>
    <!-- Shield (oval) -->
    <ellipse cx="0" cy="0" rx="22" ry="40" fill="#BB0000" stroke="#000" stroke-width="2"/>
    <!-- Shield pattern -->
    <ellipse cx="0" cy="0" rx="16" ry="34" fill="none" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="-34" x2="0" y2="34" stroke="#000" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="4" ry="8" fill="#fff" stroke="#000" stroke-width="1"/>
  </g>
</svg>
