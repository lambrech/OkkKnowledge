<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Diagonal halves -->
  <polygon points="0,0 300,0 300,200" fill="#FF8C00"/>
  <polygon points="0,0 0,200 300,200" fill="#FFD520"/>
  <!-- Simplified dragon (Druk) in white -->
  <g fill="#fff" stroke="#fff" stroke-width="1">
    <!-- Dragon body - serpentine curve -->
    <path d="M80,130 Q100,80 140,90 Q170,95 180,70 Q190,50 220,60 Q245,68 240,90 Q235,110 210,115 Q190,118 185,135 Q180,155 200,160" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <!-- Dragon head -->
    <circle cx="205" cy="158" r="12"/>
    <circle cx="210" cy="153" r="3" fill="#FF8C00"/>
    <!-- Dragon claws -->
    <path d="M130,95 l-10,-15 M132,95 l-2,-18" stroke="#fff" stroke-width="3" fill="none"/>
    <path d="M190,120 l10,-15 M188,118 l15,-8" stroke="#fff" stroke-width="3" fill="none"/>
    <!-- Tail -->
    <path d="M80,130 Q65,145 70,155 Q75,162 85,155" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
