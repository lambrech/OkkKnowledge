<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Green background -->
  <rect width="300" height="200" fill="#009B3A"/>
  <!-- Black triangles top and bottom -->
  <polygon points="0,0 150,100 300,0" fill="#000"/>
  <polygon points="0,200 150,100 300,200" fill="#000"/>
  <!-- Gold diagonal cross -->
  <polygon points="0,0 30,0 300,185 300,200 270,200 0,15" fill="#FED100"/>
  <polygon points="300,0 270,0 0,185 0,200 30,200 300,15" fill="#FED100"/>
</svg>
