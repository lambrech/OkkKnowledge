<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#fff"/>
  <!-- Yin-yang (Taegeuk) -->
  <circle cx="150" cy="100" r="42" fill="#CD2E3A"/>
  <path d="M150,58 A42,42 0 0,1 150,142 A21,21 0 0,1 150,100 A21,21 0 0,0 150,58z" fill="#0047A0"/>
  <!-- Trigrams -->
  <!-- Top-left (Geon) -->
  <g transform="translate(150,100) rotate(-55)">
    <rect x="55" y="-14" width="40" height="6" fill="#000"/>
    <rect x="55" y="-4" width="40" height="6" fill="#000"/>
    <rect x="55" y="6" width="40" height="6" fill="#000"/>
  </g>
  <!-- Bottom-right (Gon) -->
  <g transform="translate(150,100) rotate(125)">
    <rect x="55" y="-14" width="17" height="6" fill="#000"/>
    <rect x="78" y="-14" width="17" height="6" fill="#000"/>
    <rect x="55" y="-4" width="17" height="6" fill="#000"/>
    <rect x="78" y="-4" width="17" height="6" fill="#000"/>
    <rect x="55" y="6" width="17" height="6" fill="#000"/>
    <rect x="78" y="6" width="17" height="6" fill="#000"/>
  </g>
  <!-- Top-right (Gam) -->
  <g transform="translate(150,100) rotate(55)">
    <rect x="55" y="-14" width="40" height="6" fill="#000"/>
    <rect x="55" y="-4" width="17" height="6" fill="#000"/>
    <rect x="78" y="-4" width="17" height="6" fill="#000"/>
    <rect x="55" y="6" width="40" height="6" fill="#000"/>
  </g>
  <!-- Bottom-left (Ri) -->
  <g transform="translate(150,100) rotate(-125)">
    <rect x="55" y="-14" width="17" height="6" fill="#000"/>
    <rect x="78" y="-14" width="17" height="6" fill="#000"/>
    <rect x="55" y="-4" width="40" height="6" fill="#000"/>
    <rect x="55" y="6" width="17" height="6" fill="#000"/>
    <rect x="78" y="6" width="17" height="6" fill="#000"/>
  </g>
</svg>
