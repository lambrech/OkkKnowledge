<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#3f51b5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Central question mark -->
  <text x="256" y="330" font-family="Arial,Helvetica,sans-serif" font-size="300" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">?</text>
  <!-- Globe icon (geography) - top left -->
  <g transform="translate(72,72)" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3">
    <circle cx="24" cy="24" r="20"/>
    <ellipse cx="24" cy="24" rx="10" ry="20"/>
    <line x1="4" y1="24" x2="44" y2="24"/>
    <path d="M8,14 Q24,10 40,14"/>
    <path d="M8,34 Q24,38 40,34"/>
  </g>
  <!-- Scroll/clock icon (history) - top right -->
  <g transform="translate(392,72)" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3">
    <circle cx="24" cy="24" r="20"/>
    <line x1="24" y1="12" x2="24" y2="24"/>
    <line x1="24" y1="24" x2="34" y2="28"/>
    <!-- Hour markers -->
    <line x1="24" y1="6" x2="24" y2="10"/>
    <line x1="24" y1="38" x2="24" y2="42"/>
    <line x1="6" y1="24" x2="10" y2="24"/>
    <line x1="38" y1="24" x2="42" y2="24"/>
  </g>
  <!-- Person icon (famous people) - bottom left -->
  <g transform="translate(72,392)" fill="rgba(255,255,255,0.5)">
    <circle cx="24" cy="14" r="10"/>
    <path d="M6,44 Q6,28 24,28 Q42,28 42,44 Z"/>
  </g>
  <!-- Atom icon (science & tech) - bottom right -->
  <g transform="translate(392,392)" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5">
    <circle cx="24" cy="24" r="4" fill="rgba(255,255,255,0.5)"/>
    <ellipse cx="24" cy="24" rx="20" ry="8"/>
    <ellipse cx="24" cy="24" rx="20" ry="8" transform="rotate(60,24,24)"/>
    <ellipse cx="24" cy="24" rx="20" ry="8" transform="rotate(120,24,24)"/>
  </g>
</svg>
